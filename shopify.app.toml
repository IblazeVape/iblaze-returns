name = "iBlaze Returns"
client_id = "699e9ffee4fd5d72b8126884d37584be"
application_url = "https://iblaze-returns.vercel.app/app"
embedded = true

[access_scopes]
scopes = "read_orders,read_all_orders,write_returns,read_customers,read_fulfillments,read_products,read_files,read_returns,read_assigned_fulfillment_orders,read_merchant_managed_fulfillment_orders,read_third_party_fulfillment_orders"

[auth]
# Not actually used by the runtime flow anymore — merchant auth is now
# token-exchange (App Bridge session token, no redirect), but Shopify
# still requires at least one redirect_url to be configured.
redirect_urls = ["https://iblaze-returns.vercel.app/app"]

[webhooks]
api_version = "2025-07"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "https://iblaze-returns.vercel.app/api/webhooks/app-uninstalled"

[pos]
embedded = false

[app_proxy]
url = "https://iblaze-returns.vercel.app/apps/returns"
subpath = "returns"
prefix = "apps"
